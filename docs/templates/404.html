<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page not found | {{ config.title }}</title>
  <meta name="description" content="This page does not exist.">

  <!-- Theme persistence — must run before body renders to prevent FOUC -->
  <script>
  (function(){
    var saved = localStorage.getItem('ss-theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var isDark = saved ? saved === 'dark' : prefersDark !== false;
    document.documentElement.classList.toggle('dark', isDark);
    document.documentElement.classList.toggle('light', !isDark);
  })();
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ get_url(path='docs.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo-text" href="{{ config.base_url }}/">
        <span class="site-logo-mark">ss</span>
        soma-schema
      </a>

      <nav class="header-nav" aria-label="Site navigation">
        <a href="https://chaitugsk07.github.io/soma-schema" target="_blank" rel="noopener">Home</a>
        <a href="{{ config.extra.github_url }}" target="_blank" rel="noopener">GitHub</a>
        <a href="https://crates.io/crates/soma-schema" target="_blank" rel="noopener">crates.io</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark theme">
          <svg id="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="main-content" style="display:flex; align-items:center; justify-content:center; min-height:60vh; text-align:center;">
    <div class="doc-page">
      <h1 style="font-size:3rem; margin-bottom:0.5rem;">404</h1>
      <p style="font-size:1.125rem; margin-bottom:2rem;">That page doesn't exist.</p>
      <a href="{{ config.base_url }}/" style="font-weight:600;">Back to the docs</a>
    </div>
  </main>

  <footer class="site-footer">
    soma-schema &mdash; <a href="{{ config.extra.github_url }}" target="_blank" rel="noopener">GitHub</a> &mdash; Apache-2.0
  </footer>

  <script>
  (function() {
    var btn  = document.getElementById('theme-toggle');
    var moon = document.getElementById('theme-icon-moon');
    var sun  = document.getElementById('theme-icon-sun');

    function updateIcon() {
      var isDark = document.documentElement.classList.contains('dark');
      moon.style.display = isDark ? 'block' : 'none';
      sun.style.display  = isDark ? 'none'  : 'block';
    }
    updateIcon();

    btn.addEventListener('click', function() {
      var isDark = document.documentElement.classList.contains('dark');
      document.documentElement.classList.toggle('dark', !isDark);
      document.documentElement.classList.toggle('light', isDark);
      localStorage.setItem('ss-theme', isDark ? 'light' : 'dark');
      updateIcon();
    });
  })();
  </script>
</body>
</html>
