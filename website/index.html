            <p>Plain-SQL Postgres migrations for Rust — AI-native, manifest-ordered, drift-detected.</p>
            <ul>
                <li><strong>AI-native:</strong> Ships ready-to-paste agent rules — Claude, Cursor, Copilot, Codex all generate correct migrations automatically.</li>
                <li><strong>Manifest ordering:</strong> migration-order.yaml defines apply order top-to-bottom and rollback in exact reverse — not filename sort.</li>
                <li><strong>Full-file drift detection:</strong> SHA-256 over the entire UP+DOWN file; editing a deployed migration errors on the next run.</li>
                <li><strong>Crash-safe atomicity:</strong> Migration SQL and tracking row commit in one transaction under a run-scoped advisory lock.</li>
            </ul>
