# cargo-deny configuration for soma-schema.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Exclude dev-dependencies from license checks (they don't ship).
exclude-dev = false

# ---------------------------------------------------------------------------
# Advisories — deny known vulnerabilities
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
ignore = []

# ---------------------------------------------------------------------------
# Licenses — allow a conservative set of permissive licenses
# ---------------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # ring uses OpenSSL-like license; rustls/sqlx pull it in via aws-lc-rs/ring
    "OpenSSL",
]
# Allow ring's non-standard license file layout.
exceptions = [
    { allow = ["ISC", "MIT", "OpenSSL"], name = "ring" },
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Bans — no duplicate crates (warnings, not errors, for minor version bumps)
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ---------------------------------------------------------------------------
# Sources — only crates.io and our own git repos
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
